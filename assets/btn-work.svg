<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 240 42" width="240" height="42" role="img" aria-label="WORK WITH ME">
  <style>
    .hv { font-family: Helvetica, Arial, sans-serif; }
    .bk { font-family: 'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 900; }
    .tm { font-family: 'Times New Roman', Times, serif; }
    .blink { animation: blink 1.2s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { .blink { animation: none; } }
  </style>
  <rect x="0" y="0" width="240" height="42" fill="#ffffff"/>
  <rect x="1" y="1" width="238" height="40" fill="#000000" stroke="#000000" stroke-width="1"/>
  <text class="hv" x="120" y="27" font-size="13" font-weight="700" fill="#ffffff" text-anchor="middle">WORK WITH ME</text>
</svg>
