<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 200" width="1200" height="200" role="img" aria-label="SANJAY KUMAR GAUTAM — BUILD YOUR OWN PLATFORM. ONLINE. — 7 years of fundamentals times agentic speed — SDE III at HighLevel, Indore IN — 1-800-HIRE-DEV">
  <style>
    .hv { font-family: Helvetica, Arial, sans-serif; }
    .bk { font-family: 'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 900; }
    .tm { font-family: 'Times New Roman', Times, serif; }
    .blink { animation: blink 1.2s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { .blink { animation: none; } }
  </style>

  <!-- page frame (top of catalog page) -->
  <rect x="0" y="0" width="1200" height="200" fill="#ffffff"/>
  <rect x="0" y="0" width="1200" height="200" fill="none" stroke="#000000" stroke-width="8"/>

  <!-- black top banner -->
  <rect x="4" y="4" width="1192" height="62" fill="#000000"/>
  <text class="hv" x="28" y="44" font-size="21" font-weight="700" fill="#ffffff" letter-spacing="0">SANJAY KUMAR GAUTAM</text>

  <!-- phone callout: red on black, pinned right -->
  <text class="hv" x="1172" y="30" font-size="16" font-weight="700" fill="#e91d2a" text-anchor="end">1-800-HIRE-DEV</text>
  <text class="tm" x="1172" y="52" font-size="12" fill="#ffffff" text-anchor="end">call now — operators (agents) standing by</text>

  <!-- HIRE a DEV yellow sticker with bevel + purple stripe -->
  <g>
    <rect x="824" y="18" width="118" height="32" fill="#000000"/>
    <rect x="820" y="14" width="118" height="32" fill="#fcc20f" stroke="#000000" stroke-width="1"/>
    <rect x="861" y="18" width="14" height="24" fill="#6a26a4"/>
    <text class="hv" x="831" y="36" font-size="13" font-weight="700" fill="#000000">HIRE</text>
    <text class="hv" x="864" y="36" font-size="13" font-weight="700" fill="#ffffff">a</text>
    <text class="hv" x="880" y="36" font-size="13" font-weight="700" fill="#000000">DEV</text>
  </g>

  <!-- white catalog strip -->
  <text class="bk" x="28" y="125" font-size="34" fill="#000000">BUILD YOUR OWN PLATFORM. ONLINE.</text>
  <text class="tm" x="28" y="162" font-size="16" fill="#000000">7 years of fundamentals &#215; agentic speed &#8212; SDE III @ HighLevel &#183; Indore, IN &#183; est. 2018</text>

  <!-- NEW! burst overlapping the banner edge -->
  <g transform="rotate(-12 1060 78)">
    <rect x="1022" y="64" width="80" height="30" fill="#000000"/>
    <rect x="1018" y="60" width="80" height="30" fill="#fcc20f" stroke="#000000" stroke-width="1"/>
    <text class="hv blink" x="1058" y="81" font-size="15" font-weight="700" fill="#000000" text-anchor="middle">NEW!</text>
  </g>

  <!-- bottom hairline of masthead -->
  <rect x="4" y="192" width="1192" height="1" fill="#000000"/>
</svg>
