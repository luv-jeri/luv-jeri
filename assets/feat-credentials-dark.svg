<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 590 185" width="590" height="185" role="img" aria-label="CREDENTIALS PLATFORM (LEAD FRONTEND)">
  <style>
    .hv { font-family: Helvetica, Arial, sans-serif; }
    .bk { font-family: 'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 900; }
    .tm { font-family: 'Times New Roman', Times, serif; }
    .blink { animation: blink 1.2s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { .blink { animation: none; } }
  </style>
  <rect x="0" y="0" width="590" height="185" fill="#0d1117"/>
  <rect x="2" y="2" width="586" height="32" fill="#ffffff" stroke="#ffffff" stroke-width="1"/>
  <text class="hv" x="14" y="24" font-size="14" font-weight="700" fill="#000000">CREDENTIALS PLATFORM</text>
  <text class="hv" x="460" y="24" font-size="10" font-weight="700" fill="#000000" text-anchor="end">LEAD FRONTEND</text>
  <rect x="2" y="34" width="586" height="149" fill="#e6915d" stroke="#ffffff" stroke-width="1"/>
  <text class="tm" x="20" y="76" font-size="14" fill="#000000">Canva-style WYSIWYG editor for digital credentials &#8212; bulk</text>
  <text class="tm" x="20" y="97" font-size="14" fill="#000000">CSV issuance, verification, analytics.</text>
  <text class="hv" x="20" y="132" font-size="10.5" font-weight="700" fill="#000000">FEAT: REACT &#183; CANVAS API &#183; MODULE FEDERATION &#183; NODE.JS</text>
  <text class="tm" x="20" y="162" font-size="13" font-style="italic" fill="#000000">As configured: shipped to production.</text>
  <g transform="rotate(-12 520 28)">
    <rect x="484" y="16" width="72" height="26" fill="#000000"/>
    <rect x="480" y="12" width="72" height="26" fill="#fcc20f" stroke="#000000" stroke-width="1"/>
    <text class="hv blink" x="516" y="30" font-size="13" font-weight="700" fill="#000000" text-anchor="middle">NEW!</text>
  </g>
