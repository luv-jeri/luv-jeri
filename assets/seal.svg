<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 150 150" width="150" height="150" role="img" aria-label="Award seal: Devs' Choice — 10,000+ developers taught — Service, Reliability, est. 2018">
  <style>
    .hv { font-family: Helvetica, Arial, sans-serif; }
    .bk { font-family: 'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 900; }
    .tm { font-family: 'Times New Roman', Times, serif; }
    .blink { animation: blink 1.2s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { .blink { animation: none; } }
  </style>
  <rect x="0" y="0" width="150" height="150" fill="#ffffff"/>
  <defs>
    <path id="ring" d="M 75 13 A 62 62 0 1 1 74.99 13"/>
  </defs>
  <circle cx="75" cy="75" r="73" fill="#e91d2a" stroke="#000000" stroke-width="1"/>
  <circle cx="75" cy="75" r="52" fill="#ffffff"/>
  <circle cx="75" cy="75" r="44" fill="#e91d2a"/>
  <text class="hv" font-size="9.5" font-weight="700" fill="#ffffff" letter-spacing="1">
    <textPath href="#ring" startOffset="2">SERVICE &#183; RELIABILITY &#183; DEVS&#8217; CHOICE &#183; EST. 2018 &#183;</textPath>
  </text>
  <text class="bk" x="75" y="72" font-size="17" fill="#ffffff" text-anchor="middle">10,000+</text>
  <text class="hv" x="75" y="90" font-size="8.5" font-weight="700" fill="#ffffff" text-anchor="middle">DEVS TAUGHT</text>
</svg>
