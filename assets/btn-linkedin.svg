<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 56" width="300" height="56" role="img" aria-label="LINKEDIN">
  <style>
    .hv { font-family: Helvetica, Arial, sans-serif; }
    .bk { font-family: 'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 900; }
    .tm { font-family: 'Times New Roman', Times, serif; }
    .blink { animation: blink 1.2s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }

    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>
  <rect x="0" y="0" width="300" height="56" fill="none"/>
  <rect x="1" y="1" width="298" height="54" fill="#ffffff" stroke="#000000" stroke-width="1.5"/>
  <text class="hv" x="150" y="35" font-size="16" font-weight="700" fill="#000000" text-anchor="middle">LINKEDIN</text>
</svg>
