<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 380 44" width="380" height="44" role="img" aria-label="THE FOUNDER">
  <style>
    text { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .r { transform-origin: left center; animation: sweep 1.2s ease-out both; }
    @keyframes sweep { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    @media (prefers-reduced-motion: reduce) { .r { animation: none; } }
  </style>
  <defs>
    <linearGradient id="a" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#db2777"/><stop offset="1" stop-color="#db2777" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect class="r" x="0" y="0" width="380" height="2.5" fill="url(#a)"/>
  <text x="2" y="32" font-size="17" font-weight="800" fill="#111827">🚀  THE FOUNDER</text>
</svg>
