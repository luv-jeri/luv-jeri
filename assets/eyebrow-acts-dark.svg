<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" width="1200" height="80" role="img" aria-label="Section: THREE ACTS SO FAR">
  <style>
    .hv { font-family: Helvetica, Arial, sans-serif; }
    .bk { font-family: 'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 900; }
    .tm { font-family: 'Times New Roman', Times, serif; }
    .blink { animation: blink 1.2s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { .blink { animation: none; } }
  </style>
  <rect x="0" y="0" width="1200" height="80" fill="#0d1117"/>
  <rect x="0" y="0" width="1200" height="80" fill="#8e8a25" stroke="#ffffff" stroke-width="1"/>
  <text class="bk" x="24" y="55" font-size="36" fill="#000000">THREE ACTS SO FAR</text>
</svg>
