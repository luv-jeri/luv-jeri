<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 20" width="1200" height="20" role="img" aria-label="section divider">
  <style>
    .dot { animation: travel 6s linear infinite; }
    @keyframes travel { from { transform: translateX(0); } to { transform: translateX(1200px); } }
    @media (prefers-reduced-motion: reduce) { .dot { animation: none; } }
  </style>
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#5eead4" stop-opacity="0"/>
      <stop offset="0.5" stop-color="#818cf8" stop-opacity="0.6"/>
      <stop offset="1" stop-color="#5eead4" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <rect x="0" y="9.5" width="1200" height="1" fill="url(#g)"/>
  <g class="dot"><circle cx="0" cy="10" r="3" fill="#5eead4"><animate attributeName="opacity" values="0;1;1;0" dur="6s" repeatCount="indefinite"/></circle></g>
</svg>
