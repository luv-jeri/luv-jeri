<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 120" width="1200" height="120" role="img" aria-label="7+ years across SaaS EdTech EnergyTech; SDE III at HighLevel; 10K+ developers taught; Founder of Haspr">
  <style>
    text { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .g { animation: rise .9s ease-out both; }
    .g2 { animation-delay: .15s; } .g3 { animation-delay: .3s; } .g4 { animation-delay: .45s; }
    @keyframes rise { from { opacity: 0; transform: translateY(14px); } to { opacity: 1; transform: none; } }
    @media (prefers-reduced-motion: reduce) { .g { animation: none; } }
  </style>
  <defs>
    <linearGradient id="n" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d9488"/><stop offset="1" stop-color="#6366f1"/>
    </linearGradient>
  </defs>
  <g class="g">
    <rect x="8"   y="8" width="284" height="104" rx="11" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="150" y="58" font-size="30" font-weight="800" fill="url(#n)" text-anchor="middle">7+</text>
    <text x="150" y="88" font-size="13" fill="#6b7280" text-anchor="middle">years · SaaS / EdTech / EnergyTech</text>
  </g>
  <g class="g g2">
    <rect x="308" y="8" width="284" height="104" rx="11" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="450" y="58" font-size="30" font-weight="800" fill="url(#n)" text-anchor="middle">SDE III</text>
    <text x="450" y="88" font-size="13" fill="#6b7280" text-anchor="middle">@ HighLevel</text>
  </g>
  <g class="g g3">
    <rect x="608" y="8" width="284" height="104" rx="11" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="750" y="58" font-size="30" font-weight="800" fill="url(#n)" text-anchor="middle">10K+</text>
    <text x="750" y="88" font-size="13" fill="#6b7280" text-anchor="middle">developers taught</text>
  </g>
  <g class="g g4">
    <rect x="908" y="8" width="284" height="104" rx="11" fill="#ffffff" stroke="#e5e7eb"/>
    <text x="1050" y="58" font-size="30" font-weight="800" fill="url(#n)" text-anchor="middle">Founder</text>
    <text x="1050" y="88" font-size="13" fill="#6b7280" text-anchor="middle">Haspr — design-led agency</text>
  </g>
</svg>
