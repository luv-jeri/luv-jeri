<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 80" width="1200" height="80" role="img" aria-label="Section: LIVE DASHBOARD">
  <style>
    .hv { font-family: Helvetica, Arial, sans-serif; }
    .bk { font-family: 'Arial Black', 'Helvetica Neue', Helvetica, Arial, sans-serif; font-weight: 900; }
    .tm { font-family: 'Times New Roman', Times, serif; }
    .blink { animation: blink 1.2s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    .sw { transform-origin: left center; animation: sweep 1.1s ease-out both; }
    @keyframes sweep { from { transform: scaleX(0); } to { transform: scaleX(1); } }
    @media (prefers-reduced-motion: reduce) { * { animation: none !important; } }
  </style>
  <rect x="0" y="0" width="1200" height="80" fill="#ffffff"/>
  <rect x="0" y="0" width="1200" height="80" fill="#9ab6c8" stroke="#000000" stroke-width="1"/>
  <text class="bk" x="24" y="50" font-size="36" fill="#000000">LIVE DASHBOARD</text>
  <rect class="sw" x="24" y="60" width="308" height="3" fill="#000000"/>
</svg>
