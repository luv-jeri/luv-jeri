<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 360" width="1200" height="360" role="img" aria-label="Sanjay Kumar Gautam — 7 years of fundamentals times agentic speed — SDE III at HighLevel, Indore IN">
  <style>
    text { font-family: -apple-system, 'Segoe UI', Helvetica, Arial, sans-serif; }
    .mono { font-family: 'SF Mono', ui-monospace, Menlo, Consolas, monospace; }
    .p { animation: pulse 2.6s ease-in-out infinite; transform-box: fill-box; transform-origin: center; }
    .d1 { animation-delay: .0s; } .d2 { animation-delay: .4s; } .d3 { animation-delay: .8s; }
    .d4 { animation-delay: 1.2s; } .d5 { animation-delay: 1.6s; } .d6 { animation-delay: 2.0s; }
    @keyframes pulse { 0%,100% { opacity:.3; transform:scale(1); } 50% { opacity:1; transform:scale(1.7); } }
    .ln { stroke-dasharray: 260; stroke-dashoffset: 260; animation: draw 4.5s ease-in-out infinite; }
    .l2 { animation-delay: .7s; } .l3 { animation-delay: 1.4s; } .l4 { animation-delay: 2.1s; }
    @keyframes draw { 0% { stroke-dashoffset: 260; opacity: 0; } 25% { opacity: .9; } 55% { stroke-dashoffset: 0; opacity: .9; } 85%,100% { stroke-dashoffset: 0; opacity: .15; } }
    .win { animation: glow 3.4s ease-in-out infinite; }
    @keyframes glow { 0%,100% { filter: none; } 50% { filter: drop-shadow(0 0 14px rgba(99,102,241,.45)); } }
    .wl { transform-origin: left center; transform-box: fill-box; animation: fill 4.5s ease-in-out infinite; }
    .w2 { animation-delay: .5s; } .w3 { animation-delay: 1s; }
    @keyframes fill { 0% { transform: scaleX(.12); opacity:.25; } 35%,100% { transform: scaleX(1); opacity:1; } }
    .cur { animation: blink 1.1s steps(1) infinite; }
    @keyframes blink { 50% { opacity: 0; } }
    @media (prefers-reduced-motion: reduce) { .p,.ln,.win,.wl,.cur { animation: none; } .ln { stroke-dashoffset: 0; opacity:.5; } .wl { transform: scaleX(1); opacity:1; } }
  </style>
  <defs>
    <radialGradient id="bg" cx="0.25" cy="0.1" r="1.1">
      <stop offset="0" stop-color="#eef2ff"/><stop offset="0.65" stop-color="#fafafa"/>
    </radialGradient>
    <linearGradient id="name" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d9488"/><stop offset="0.55" stop-color="#6366f1"/><stop offset="1" stop-color="#db2777"/>
    </linearGradient>
    <linearGradient id="beam" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#0d9488" stop-opacity="0"/><stop offset="0.5" stop-color="#0d9488"/><stop offset="1" stop-color="#6366f1" stop-opacity="0"/>
    </linearGradient>
  </defs>

  <rect width="1200" height="360" rx="14" fill="url(#bg)"/>
  <rect x="0.5" y="0.5" width="1199" height="359" rx="14" fill="none" stroke="#e5e7eb"/>

  <!-- identity -->
  <text x="70" y="150" font-size="42" font-weight="800" fill="#111827" letter-spacing="-0.5">Sanjay Kumar Gautam</text>
  <text class="mono" x="70" y="202" font-size="22" font-weight="600" fill="url(#name)">7 years of fundamentals × agentic speed</text>
  <rect class="cur" x="608" y="184" width="11" height="22" fill="#0d9488"/>
  <text x="70" y="244" font-size="16" fill="#4b5563">SDE III @ HighLevel · Indore, IN</text>

  <!-- constellation -->
  <g>
    <circle class="p d1" cx="700" cy="70"  r="4" fill="#0d9488"/>
    <circle class="p d3" cx="760" cy="160" r="4" fill="#6366f1"/>
    <circle class="p d5" cx="690" cy="250" r="4" fill="#db2777"/>
    <circle class="p d2" cx="800" cy="300" r="4" fill="#0d9488"/>
    <circle class="p d4" cx="640" cy="180" r="3" fill="#6366f1"/>
    <circle class="p d6" cx="745" cy="40"  r="3" fill="#db2777"/>
    <line class="ln"    x1="700" y1="70"  x2="880" y2="100" stroke="url(#beam)" stroke-width="1.4"/>
    <line class="ln l2" x1="760" y1="160" x2="880" y2="170" stroke="url(#beam)" stroke-width="1.4"/>
    <line class="ln l3" x1="690" y1="250" x2="880" y2="220" stroke="url(#beam)" stroke-width="1.4"/>
    <line class="ln l4" x1="800" y1="300" x2="920" y2="252" stroke="url(#beam)" stroke-width="1.4"/>
  </g>

  <!-- product window the agents assemble -->
  <g class="win">
    <rect x="880" y="78" width="240" height="186" rx="12" fill="rgba(255,255,255,0.6)" stroke="#6366f1" stroke-opacity="0.6" stroke-width="1.2"/>
    <line x1="880" y1="106" x2="1120" y2="106" stroke="#6366f1" stroke-opacity="0.3"/>
    <circle cx="898" cy="92" r="3.5" fill="#d1d5db"/><circle cx="912" cy="92" r="3.5" fill="#d1d5db"/><circle cx="926" cy="92" r="3.5" fill="#d1d5db"/>
    <rect class="wl"    x="898" y="126" width="204" height="9" rx="4.5" fill="#6366f1" fill-opacity="0.45"/>
    <rect class="wl w2" x="898" y="150" width="150" height="9" rx="4.5" fill="#0d9488" fill-opacity="0.55"/>
    <rect class="wl w3" x="898" y="174" width="108" height="9" rx="4.5" fill="#6366f1" fill-opacity="0.35"/>
    <rect x="898" y="206" width="76" height="26" rx="7" fill="none" stroke="#0d9488" stroke-opacity="0.6"/>
    <text class="mono" x="912" y="224" font-size="12" fill="#0d9488">ship()</text>
  </g>
</svg>
