name: snake
on:
  schedule:
    - cron: "23 5 * * *"
  workflow_dispatch:
  push:
    branches:
      - main

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Generate snake (Dell-1996 tint palette)
        uses: Platane/snk/svg-only@v3
        with:
          github_user_name: luv-jeri
          outputs: |
            dist/github-snake.svg?color_snake=#8c9ae0&color_dots=#e5e7eb,#c0d4a7,#b3bd95,#9ab6c8,#8c9ae0
            dist/github-snake-dark.svg?palette=github-dark&color_snake=#8c9ae0&color_dots=#161b22,#c0d4a7,#b3bd95,#9ab6c8,#8c9ae0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Push to output branch
        uses: crazy-max/ghaction-github-pages@v4
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
